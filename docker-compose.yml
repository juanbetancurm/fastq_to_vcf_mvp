services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: iei_platform
      POSTGRES_USER: iei_user
      POSTGRES_PASSWORD: iei_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
