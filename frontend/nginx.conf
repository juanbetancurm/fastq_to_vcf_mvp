server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React Router — all non-file paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache content-hashed assets for one year
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
